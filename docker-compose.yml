services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=dev
      - CORS_ORIGINS=http://localhost:5173
      - DATA_PROVIDER=yfinance
      - BENCHMARK=^NSEI
      - DB_URL=sqlite:///./trading.db

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
